description = "워크스페이스 콘텐츠 품질 & 인덱스 무결성 점검 (Content & Index Audit)"

prompt = """
사용자가 `/index` 슬래시 커맨드를 호출했습니다. 인자(target): `{{args}}`

## 본 커맨드의 정체
`/index`는 **진단 전용 도구**입니다. 자동 수정은 하지 않습니다.
스크립트는 JSON 리포트만 출력하며, 모든 수정은 별도 단계로 CEO 승인을 거쳐 수동 적용됩니다.

HamesSystem 규칙 구조 점검은 `/doctor` 담당.

## 진단 항목 (스키마: `index-2026-05-08`)
공통 (모든 tier): frontmatter 완결성·필드순서, 값 인벤토리, 푸터, 중복 의심, 위키링크
추가 (tier=`deep` & Anti 워크스페이스): 고아 파일, 임시 파일, 아카이브 후보(60일+), `_Index.md` 누락

## Tier 결정 규칙
- **deep**: `workspaces/Investment`/`01_Business`/`02_Company`/`03_Hobby`, 또는 워크스페이스 루트에 `_Index.md` 가 있는 워크스페이스
- **light**: 그 외. frontmatter / footer / duplicates / wikilinks / value_inventory 만 검사
각 워크스페이스 리포트의 `tier` 필드에 적용 모드가 표기됩니다.

## 인자 형태
- alias (대소문자 무시): 워크스페이스 이름의 다양한 표기
- 상대 경로: `workspaces/Company`, `nested-project/sub-app`
- 빈 문자열 또는 `--all`: 전체 진단 (`.claude/workspace_paths.json` 의 등록 워크스페이스 + `.Arsenal` 도구 레지스트리 점검)

## 실행 결과
```json
!{python arsenal/manager.py {{args}}}
```

manager.py 는 인자가 비어있거나 `--all` 일 때 전체 진단을 수행합니다.

## 분석 항목

| 항목 | JSON 필드 (`audit.*`) | 비고 |
|---|---|---|
| 프론트매터 이슈 | `missing_frontmatter` | 필드 누락 + 순서 오류 |
| 푸터 누락 | `footer_missing` | `## 관련노트` 미존재 |
| 값 인벤토리 | `value_inventory` | 비일관 값 탐지용 전체 현황 |
| 고아 파일 | `orphaned_files` | `_Index.md` 미등재 (deep + Anti only) |
| 임시 파일 | `temp_files` | 즉시 삭제 제안 가능 (deep + Anti only) |
| 아카이브 후보 | `archive_candidates` | 60일+ 미수정 (deep + Anti only) |
| 인덱스 누락 | `missing_indexes` | 워크스페이스에 `_Index.md` 없음 (deep + Anti only) |
| 중복 의심 | `potential_duplicates` | CEO 단일화/삭제 결재 요청 |
| 링크 검증 | `links_found_for_agent_verification` | 에이전트가 경로·워크스페이스 직접 확인 |

추가 출력: `recommended_actions` (구조화 액션 리스트), `arsenal_registry_audit` (전체 진단일 때만).

## 보고 후 조치 원칙
- 스크립트는 직접 파일을 수정하지 않습니다.
- `recommended_actions` 항목별로 위험도(`risk_level`)와 근거(`rationale`)를 함께 제시합니다.
- CEO 승인된 항목만 별도 단계에서 surgical Edit / 파일 생성 / 항목 제거 등으로 적용합니다.
  - `_Index.md` 보강은 표 구조를 **절대 파괴하지 않고** 신규 행만 Merge.
  - frontmatter / footer 수정은 파일별 수술적 Edit. 전체 재작성 금지.
"""
