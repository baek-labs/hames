description = "Create a model handoff using a single canonical handoff document and then validate it."

prompt = """
사용자가 `/handoff` 슬래시 커맨드를 호출했습니다. 인자(target_model): `{{args}}`

## Flow

**Step 1 — Confirm target model**
- 인자가 `claude`, `gemini`, `codex` 중 하나인지 확인.
- 인자가 없으면 어느 모델로 핸드오프할지 사용자에게 질문.

**Step 2 — Summarize the current session**
현재 대화·작업 컨텍스트로부터 다음 준비:
- `task_summary`
- `current_state`
- `next_step`
- `source_model`
- `source_workspace` (실제 작업이 일어난 워크스페이스. AI_COMM 사용 금지)
- `handoff_id` 형식: `HAMES-{YYYYMMDD}-{KEYWORD}` 또는 `SESSION-{YYYY-MM-DD}-{LETTER}`

**Step 3 — Create the handoff file**
PowerShell 호출 (Windows 환경):
```powershell
!{powershell -NoProfile -ExecutionPolicy Bypass -File arsenal/create_handoff.ps1 -HandoffId "<handoff_id>" -TargetModel "{{args}}" -SourceModel "<source_model>" -SourceWorkspace "<source_workspace>" -TaskSummary "<task_summary>" -CurrentState "<current_state>" -NextStep "<next_step>"}
```

**Step 4 — Refresh target bootstrap (only if needed)**
- `gemini`: `start_hames_gemini.ps1 -Handoff` 호출
- `codex`: `start_hames_codex.ps1 -Handoff` 호출
- `claude`: bootstrap 생성 스킵

**Step 5 — Validate**
```powershell
!{powershell -NoProfile -ExecutionPolicy Bypass -File arsenal/validate_handoff.ps1 -HandoffFile "ai_comm/_Inbox/Handoff_<handoff_id>.md"}
```

**Step 6 — Report**
- PASS: handoff 파일 경로, bootstrap 파일 경로(생성된 경우), handoff id 보고.
- FAIL: 누락 필드 또는 검증 실패 보고 후 수동 수정 요청.

위 단계를 순차적으로 실행하고 각 단계 결과를 사용자에게 보고하세요.
"""
