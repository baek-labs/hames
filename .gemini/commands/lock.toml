description = "워크스페이스 Lock 설정 및 작업 환경 준비"

prompt = """
사용자가 `/lock` 슬래시 커맨드를 호출했습니다. 인자(workspace): `{{args}}`

## 유효한 워크스페이스 (사용자 정의)
- **Tier 1 (entry 파일 보유):** `workspaces/<NAME>/` 아래 자체 CLAUDE.md/AGENTS.md를 둔 정식 워크스페이스. 사용자 본인 워크스페이스 이름 직접 사용.
- **Tier 2 (lock-only, entry 파일 없음):** 단순 편집 범위 제한 디렉토리. entry 파일 없이도 lock 가능.

**범위 선택 패턴:**
- 컨테이너 전체 lock: 상위 디렉토리 이름 — 하위 자유 이동
- 개별 프로젝트만 lock: 정확한 디렉토리 이름 — 형제 차단

세션 키는 Hames launcher/app runtime이 자동 주입한다 (`HAMES_SESSION_ID`, `CODEX_THREAD_ID`, Gemini는 `GEMINI_SESSION_ID` 또는 launcher가 export한 값). 같은 모델을 여러 창/세션으로 띄워도 각 세션의 lock은 독립적으로 적용된다.

## Step 1 — Lock 파일 갱신
PowerShell helper를 실행해 `.claude/.workspace_lock` 안의 현재 세션 항목만 갱신합니다 (이 경로는 모든 환경 단일 — workspace_guard hook이 이 파일을 읽음).

```bash
powershell -ExecutionPolicy Bypass -File arsenal/set_workspace_lock.ps1 -Workspace {{args}}
```

`.claude/.workspace_lock`은 세션별 map을 사용한다. 기존 전역 lock 형식도 하위 호환으로 유지된다.

## Step 2 — 워크스페이스 컨텍스트 로드
해당 워크스페이스의 entry 파일을 읽어 로컬 규칙 적용:
- Gemini CLI 환경: `CLAUDE.md` 또는 `AGENTS.md` 중 존재하는 것을 read.
- entry 파일 없는 Tier 2 워크스페이스는 이 단계 스킵하고 lock-only 모드로 진행.

| 워크스페이스 종류 | entry 경로 |
|---|---|
| 일반 워크스페이스 | `workspaces/<NAME>/CLAUDE.md` (또는 `AGENTS.md`) |
| 격리 도메인 (advanced) | `<DomainRoot>/CLAUDE.md` + `<DomainRoot>/AGENTS.md` (선택) |
| Lock-only 디렉토리 | (없음 — Step 2 스킵) |

## Step 3 — 격리 도메인 전용 준비 (해당 시)
격리 도메인은 자체 에이전트 팀과 hook을 가진다. Lock 시 해당 도메인의 `<Root>/.claude/agents/` 디렉토리 확인. 패턴은 `docs/04_workspace_model.md` 참조.

## Step 4 — 상태 보고
```
[WORKSPACE LOCK] Active: {{args}} | Lock: ON
쓰기 차단 범위: 현재 세션에서 {{args}} 외부 모든 경로
읽기: 전체 허용 (Read/Glob/Grep 무조건 통과)
SYSTEM_ADMIN 경로 (arsenal, .claude, .codex, .gemini, .agents): 항상 허용
해제: "고정 해제" 입력
```

## 고정 해제
사용자가 "고정 해제", "lock 해제", "unlock" 입력 시 helper를 unlock 모드로 실행:

```bash
powershell -ExecutionPolicy Bypass -File arsenal/set_workspace_lock.ps1 -Unlock
```

이후 현재 세션만 루트 모드로 복귀하고 상태 보고.
"""
