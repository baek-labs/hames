description = "Hames 루트 전체 변경분 커밋 → main push (서브모듈 안전 검증 포함)"

prompt = """
사용자가 `/save` 슬래시 커맨드를 호출했습니다. 인자: `{{args}}` (인자 무시, 자동 동작)

Hames 루트의 모든 변경분(`.gitignore` 제외)을 한 번에 커밋하고 main에 push한다. 서브모듈이 이미 push된 상태라는 전제 위에서, 어떤 서브모듈이라도 unpushed/dirty 상태이면 즉시 멈춰 경고한다.

## 사전 조건
- CWD는 Hames 루트(`{{HAMES_ROOT_ESCAPED}}`)여야 함.
- 현재 브랜치가 `main`이어야 함.

## Step 1 — 환경 검증
```bash
!{git rev-parse --show-toplevel}
!{git branch --show-current}
```
- 루트가 Hames 루트가 아니면 중단.
- 브랜치가 `main`이 아니면 "main 브랜치에서만 실행 가능" 후 중단.

## Step 2 — 서브모듈 안전 검증 (블로킹)

`.gitmodules`에 등록된 모든 서브모듈을 순회. 하나라도 걸리면 즉시 중단하고 모든 문제 서브모듈을 한 번에 보고.

```bash
!{git config --file .gitmodules --get-regexp path}
```

각 서브모듈에 대해:
```bash
!{cd <submodule_path> && git status --porcelain}
!{cd <submodule_path> && git rev-list --left-right --count '@{u}...HEAD' 2>/dev/null}
```

차단 조건:
- `git status --porcelain` 출력이 비어있지 않음 → "더티 워킹트리"
- ahead > 0 → "unpushed commit 있음"
- upstream 미설정 → "upstream 미설정"

차단 시 출력 형식:
```
서브모듈 안전 검증 실패. push 중단.
- <path1>: 더티 워킹트리
- <path2>: unpushed commit 3개
```
이후 `/subpush <path>` 또는 직접 정리 후 재실행 안내.

## Step 3 — 루트 변경 유무 확인

**부정형 결론 안전장치:** 아래 명령의 raw 출력을 화면에 그대로 박은 뒤에만 결론을 낸다. "변경사항 없음"이라는 부정형 결론을 raw 출력 표시 없이 내릴 수 없다.

```bash
!{cd {{HAMES_ROOT_ESCAPED}} && git status --porcelain --untracked-files=all}
```
- raw 출력을 그대로(요약·재해석 금지) 사용자에게 표시.
- raw 출력이 진짜로 0줄일 때만 "변경사항 없음" 후 종료.
- 1줄이라도 있으면 Step 4로 (gitlink 변경이 있든 없든 무관).

## Step 4 — 일괄 스테이징
```bash
!{cd {{HAMES_ROOT_ESCAPED}} && git add -A}
```

## Step 5 — 자동 커밋 메시지 생성

`git diff --cached --name-only`로 스테이지 목록을 받아 결정:
- 서브모듈 gitlink 1개뿐: `chore: bump <path> gitlink`
- 서브모듈 gitlink 2개 이상 + 루트 파일 변경 없음: `chore: bump gitlinks (<path1>, <path2>, ...)`
- 그 외 (루트 파일 포함 / 혼합 / 루트만): `chore: snapshot YYYY-MM-DD HH:MM` (현지 시간)

```bash
!{cd {{HAMES_ROOT_ESCAPED}} && git commit -m "<message>"}
```

## Step 6 — push
```bash
!{cd {{HAMES_ROOT_ESCAPED}} && git push origin main}
```

## Step 7 — 검증 보고
```bash
!{cd {{HAMES_ROOT_ESCAPED}} && git rev-list --left-right --count origin/main...HEAD}
```
- `0	0`이면 "save 완료 — <commit message>" 한 줄.
- 그 외엔 ahead/behind 숫자 + 다음 액션.

## 안전 규칙
- Step 2에서 서브모듈 하나라도 더티/unpushed/upstream 미설정이면 어떤 스테이징도 하지 않음.
- `--force`, `--no-verify` 등 destructive 옵션 금지.
- main 외 브랜치에서 호출되면 즉시 중단. 자동 브랜치 전환 금지.
- 자동으로 `git pull` / `git stash` 시도하지 않음.
- 커밋 메시지에 `Co-Authored-By` 추가하지 않음.
"""
